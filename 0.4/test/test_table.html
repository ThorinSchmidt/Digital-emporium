<html>
	<script
	  src="https://code.jquery.com/jquery-4.0.0.js">
	</script>
	
	<script type="text/javascript">
		let file_name = "core.json";
		$.getJSON(file_name, function(data){
			var groups = ["1","2","3","4"];
			
			$.each(data.rows, function(){
				let item_type = this['type'];
				//console.log(groups[1]);
				let new_row = document.createElement("tr");
				let name_cell = document.createElement("td");
				name_cell.innerHTML = this['name'];
				
				let cost_cell = document.createElement("td");
				cost_cell.innerHTML = this['cost'];
				
				let load_cell = document.createElement("td");
				//load_cell.setAttribute("style", "font-weight: bold;");
				load_cell.innerHTML = this['load'];
				
				let desc_cell = document.createElement("td");
				var description = "";
				this['desc'].forEach((string_item) =>{
					description += string_item;
				});
				//console.log(description);
				desc_cell.innerHTML = description;
				new_row.append(name_cell);
				new_row.append(cost_cell);
				new_row.append(load_cell);
				new_row.append(desc_cell);
				
				document.getElementById("rows").appendChild(new_row);
				
			});
		});
	</script>
	<body>
		<table id="inventory">
		<thead>
			<tr>
				<th class="first_th"> Item Name </th>
				<th class="second_th"> Gp </th>
				<th class="third_th"> Load </th>
				<th class="fourth_th"> Description </th>
				<th class="spacer">&nbsp;</th>
			</tr>
		</thead>
		<tbody id="rows">
		
		</body>
		</table>
	</body>

</html>
